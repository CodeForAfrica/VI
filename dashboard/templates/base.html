<!DOCTYPE html>
<html>
<head>
    <!-- Your existing head content -->
    {% block extra_css %}
    {% endblock %}
    
    <!-- Chatbot Styles - ADD THIS SECTION -->
    <style>
        /* Floating Chat Widget Styles */
        .chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
            font-family: Arial, sans-serif;
        }
        
        .chatbot-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .chatbot-button:hover {
            transform: scale(1.1);
            background-color: #45a049;
        }
        
        .chatbot-window {
            width: 350px;
            height: 450px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            position: absolute;
            bottom: 70px;
            right: 0;
        }
        
        .chatbot-header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chatbot-close {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .chatbot-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #f9f9f9;
        }
        
        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 80%;
        }
        
        .user-message {
            background-color: #dcf8c6;
            margin-left: auto;
        }
        
        .bot-message {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
        }
        
        .chatbot-input {
            display: flex;
            padding: 10px;
            background-color: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .chatbot-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        
        .chatbot-input button {
            margin-left: 10px;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- Your existing body content -->
    {% block content %}
    {% endblock %}

    <!-- Floating Chat Widget - ADD THIS SECTION AT THE BOTTOM -->
    <div class="chatbot-container">
        <button class="chatbot-button" id="chatbotToggle">
            💬
        </button>
        <div class="chatbot-window" id="chatbotWindow">
            <div class="chatbot-header">
                <span>Disinfo Assistant</span>
                <button class="chatbot-close" id="chatbotClose">×</button>
            </div>
            <div class="chatbot-messages" id="chatbotMessages">
                <div class="message bot-message">
                    Hello! I'm your disinformation analysis assistant. Ask me about articles, trends, actors, or anything else in our database!
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator">
                Assistant is typing...
            </div>
            <div class="chatbot-input">
                <input type="text" id="chatbotInput" placeholder="Ask about articles, trends, actors...">
                <button id="chatbotSend">Send</button>
            </div>
        </div>
    </div>

    <!-- Your existing scripts -->
    {% block extra_js %}
    {% endblock %}
    
    <!-- Chatbot JavaScript - ADD THIS SECTION -->
    <script>
        // Chatbot JavaScript functionality
        document.addEventListener('DOMContentLoaded', function() {
            const chatbotToggle = document.getElementById('chatbotToggle');
            const chatbotWindow = document.getElementById('chatbotWindow');
            const chatbotClose = document.getElementById('chatbotClose');
            const chatbotMessages = document.getElementById('chatbotMessages');
            const chatbotInput = document.getElementById('chatbotInput');
            const chatbotSend = document.getElementById('chatbotSend');
            const typingIndicator = document.getElementById('typingIndicator');

            // Toggle chat window
            chatbotToggle.addEventListener('click', () => {
                chatbotWindow.style.display = chatbotWindow.style.display === 'flex' ? 'flex' : 'none';
            });

            // Close chat window
            chatbotClose.addEventListener('click', () => {
                chatbotWindow.style.display = 'none';
            });

            // Send message
            chatbotSend.addEventListener('click', sendMessage);
            chatbotInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            function sendMessage() {
                const message = chatbotInput.value.trim();
                if (!message) return;

                // Add user message
                addMessage(message, 'user');
                chatbotInput.value = '';

                // Show typing indicator
                typingIndicator.style.display = 'block';

                // Send to backend
                fetch('{% url "chatbot_response" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({message: message})
                })
                .then(response => response.json())
                .then(data => {
                    typingIndicator.style.display = 'none';
                    if (data.success && data.response) {
                        addMessage(data.response, 'bot');
                    } else {
                        addMessage('Sorry, I encountered an error. Please try again.', 'bot');
                    }
                })
                .catch(error => {
                    typingIndicator.style.display = 'none';
                    addMessage('Connection error. Please check your internet connection.', 'bot');
                });
            }

            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message', `${sender}-message`);
                messageDiv.textContent = text;
                chatbotMessages.appendChild(messageDiv);
                
                // Scroll to bottom
                chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
            }

            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }
        });
    </script>
</body>
</html>
