<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerability Index Tool - Code for Africa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --navy-dark: #1a2a40;
            --navy-medium: #2c3e50;
            --slate: #475569;
            --action-blue: #2563eb;
            --bg-light: #f1f5f9;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--navy-dark);
        }

        /* Header Styling */
        header { background-color: white; border-bottom: 1px solid #e2e8f0; }

        /* Navbar Styling */
        .navbar { background-color: white; border-bottom: 1px solid #e2e8f0; padding: 0.5rem 0; }
        .nav-link { color: var(--slate); font-weight: 500; margin: 0 10px; }
        .nav-link.active { color: var(--navy-dark); border-bottom: 2px solid var(--navy-dark); }
        .nav-link:hover { color: var(--action-blue); }

        /* Footer Styling */
        .footer-navy {
            background-color: var(--navy-dark);
            color: white;
            padding: 30px 0;
            margin-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

<header class="py-4">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-3 col-12 text-md-start text-center mb-md-0 mb-3">
                <img src="{% static 'dashboard/images/Africa logo.png' %}" 
                     alt="Code for Africa" 
                     height="45" 
                     style="max-height: 45px; width: auto; object-fit: contain;">
            </div>

            <div class="col-md-6 col-12 text-center">
                <h1 class="h3 fw-bold mb-1" style="color: var(--navy-dark);">
                    Vulnerability Index Tool
                </h1>
                <p class="small text-muted mb-0 text-uppercase tracking-wider">
                    Monitoring Media Narratives Across Africa
                </p>
            </div>

            <div class="col-md-3 col-12 text-md-end text-center">
                <small class="text-muted">Last updated: February 2026</small>
            </div>
        </div>
    </div>
</header>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <div class="navbar-nav mx-auto">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'overview' %}">Home</a>
            <a class="nav-link {% if '/authors/' in request.path %}active{% endif %}" href="{% url 'authors' %}">Authors</a>
            <a class="nav-link {% if '/countries/' in request.path %}active{% endif %}" href="{% url 'countries' %}">Countries</a>
            <a class="nav-link {% if 'outlets' in request.path %}active{% endif %}" href="{% url 'media' %}">Media</a>
            <a class="nav-link {% if '/report/' in request.path %}active{% endif %}" href="{% url 'generate_report' %}">Report</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<footer class="footer-navy">
    <div class="container">
        <p class="mb-1">© 2026 Code for Africa • Vulnerability Index Tool</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
