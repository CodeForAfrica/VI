<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerability Index Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --navy-dark: #1a2a40;
            --navy-medium: #2c3e50;
            --slate: #475569;
            --action-blue: #2563eb;
            --bg-light: #f1f5f9;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--navy-dark);
        }

        /* Navbar Styling */
        .navbar { background-color: white; border-bottom: 1px solid #e2e8f0; }
        .nav-link { color: var(--slate); font-weight: 500; }
        .nav-link.active { color: var(--navy-dark); border-bottom: 2px solid var(--navy-dark); }

        /* Footer Styling - Replaces the red bar */
        .footer-navy {
            background-color: var(--navy-dark);
            color: white;
            padding: 30px 0;
            margin-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" style="color: var(--navy-dark);">
                Vulnerability Index Tool
            </a>
            <div class="navbar-nav mx-auto">
                <a class="nav-link active" href="/">Home</a>
                <a class="nav-link" href="/authors/">Authors</a>
                <a class="nav-link" href="/actors/">Actors</a>
                <a class="nav-link" href="/report/">Report</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer-navy">
        <div class="container">
            <p class="mb-1">© 2026 Code for Africa • Vulnerability Index Tool</p>
            <p class="small opacity-75">Data Visualization Dashboard • Built with Django & Plotly</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
