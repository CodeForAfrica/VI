{% for article in page_obj %}
<div class="row mb-4 pb-3 border-bottom align-items-center">
    <div class="col-md-9">
        <h5 class="mb-1 text-primary">{{ article.title }}</h5>
        <p class="text-muted small mb-2">{{ article.media_outlet }} • {{ article.posting_time|date:"M d, Y" }}</p>
        
        <div class="mb-2">
            <span class="badge bg-success rounded-pill">Tone: {{ article.tone }}</span>
            <span class="badge bg-warning text-dark rounded-pill">Intent: {{ article.strategic_intent }}</span>
        </div>

        <p class="small text-secondary">{{ article.summary|truncatewords:40 }}</p>
        
        <div class="text-end">
            <a href="{{ article.full_link }}" target="_blank" class="text-decoration-none fw-bold small">Read full article →</a>
        </div>
    </div>
</div>
{% endfor %}
