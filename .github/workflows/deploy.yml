name: VI | Build and Deploy

on:
  push:
    branches:
      - main
      - chore/dokku-github-actions
  workflow_dispatch:
    inputs:
      version:
        description: Image version to publish and deploy, for example 1.0.0
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: true

env:
  APP_NAME: ${{ secrets.DOKKU_APP_NAME }}
  DOKKU_REMOTE_URL: ssh://dokku@${{ secrets.DOKKU_HOST }}/${{ secrets.DOKKU_APP_NAME }}
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE || 'codeforafrica/vulnerability-index-tool' }}

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-24.04-arm
    environment: prod
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke-check Python syntax
        run: python -m compileall config dashboard manage.py

      - name: Set image version
        id: image
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="sha-$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE_NAME}:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.image.outputs.image }}

      - name: Push to Dokku
        uses: dokku/github-action@v1.9.0
        with:
          git_remote_url: ${{ env.DOKKU_REMOTE_URL }}
          ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
          deploy_docker_image: ${{ steps.image.outputs.image }}
