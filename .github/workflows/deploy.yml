name: CI and Dokku Deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: prod
        type: choice
        options:
          - dev
          - prod
      ref:
        description: Git ref to deploy
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke-check Python syntax
        run: python -m compileall config dashboard manage.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Dokku DEV
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}

      - name: Trust Dokku host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DOKKU_HOST }}" >> ~/.ssh/known_hosts

      - name: Configure Dokku git remote
        run: git remote add dokku "dokku@${{ secrets.DOKKU_HOST }}:${{ secrets.DOKKU_APP_NAME }}"

      - name: Deploy current commit to Dokku DEV
        run: git push dokku "HEAD:master" --force

  deploy-prod:
    name: Deploy to Dokku PROD
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}

      - name: Trust Dokku host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DOKKU_HOST }}" >> ~/.ssh/known_hosts

      - name: Configure Dokku git remote
        run: git remote add dokku "dokku@${{ secrets.DOKKU_HOST }}:${{ secrets.DOKKU_APP_NAME }}"

      - name: Deploy selected ref to Dokku PROD
        run: git push dokku "HEAD:master" --force
