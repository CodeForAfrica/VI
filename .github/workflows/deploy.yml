name: CI and Dokku Deploy

on:
  push:
    branches:
      - main
      - chore/dokku-github-actions
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
      version:
        description: SemVer image version to publish, for example 1.0.0
        required: false
        type: string

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: ${{ vars.DOCKERHUB_IMAGE || 'codeforafrica/vulnerability-index-tool' }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build server image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke-check Python syntax
        run: python -m compileall config dashboard manage.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' || github.head_ref == 'chore/dokku-github-actions'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}},value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build application image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: ${{ github.event_name != 'pull_request' || github.head_ref == 'chore/dokku-github-actions' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture immutable image reference
        id: image
        if: github.event_name != 'pull_request' || github.head_ref == 'chore/dokku-github-actions'
        run: echo "image_ref=docker.io/${IMAGE_REPOSITORY}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy-prod:
    name: Deploy to Dokku
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.head_ref == 'chore/dokku-github-actions')
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - name: Configure SSH
        env:
          DOKKU_SSH_PRIVATE_KEY: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
          DOKKU_SSH_PRIVATE_KEY_B64: ${{ secrets.DOKKU_SSH_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "$DOKKU_SSH_PRIVATE_KEY_B64" ]; then
            printf '%s' "$DOKKU_SSH_PRIVATE_KEY_B64" | tr -d '[:space:]' | base64 -d > ~/.ssh/dokku_deploy_key
          elif [ -n "$DOKKU_SSH_PRIVATE_KEY" ]; then
            printf '%s\n' "$DOKKU_SSH_PRIVATE_KEY" | sed 's/\\n/\n/g' > ~/.ssh/dokku_deploy_key
          else
            echo "DOKKU_SSH_PRIVATE_KEY_B64 or DOKKU_SSH_PRIVATE_KEY must be set"
            exit 1
          fi
          chmod 600 ~/.ssh/dokku_deploy_key
          ssh-keygen -y -f ~/.ssh/dokku_deploy_key > ~/.ssh/dokku_deploy_key.pub
          ssh-keyscan -H "${{ secrets.DOKKU_HOST }}" >> ~/.ssh/known_hosts

      - name: Log Dokku app into Docker Hub
        run: |
          ssh -i ~/.ssh/dokku_deploy_key "dokku@${{ secrets.DOKKU_HOST }}" \
            "echo '${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}' | registry:login '${{ secrets.DOKKU_APP_NAME }}' --password-stdin docker.io '${{ secrets.DOCKER_HUB_USERNAME }}'"

      - name: Release Docker Hub image on Dokku
        run: |
          ssh -i ~/.ssh/dokku_deploy_key "dokku@${{ secrets.DOKKU_HOST }}" \
            "git:from-image --force '${{ secrets.DOKKU_APP_NAME }}' '${{ needs.build.outputs.image_ref }}' 'GitHub Actions' 'github-actions@users.noreply.github.com'"
