name: CI and Dokku Deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: ${{ vars.DOCKERHUB_IMAGE }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build server image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke-check Python syntax
        run: python -m compileall config dashboard manage.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build application image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture immutable image reference
        id: image
        if: github.event_name != 'pull_request'
        run: echo "image_ref=docker.io/${IMAGE_REPOSITORY}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy-prod:
    name: Deploy to Dokku
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}

      - name: Trust Dokku host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DOKKU_HOST }}" >> ~/.ssh/known_hosts

      - name: Log Dokku app into Docker Hub
        run: |
          ssh "dokku@${{ secrets.DOKKU_HOST }}" \
            "echo '${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}' | registry:login '${{ secrets.DOKKU_APP_NAME }}' --password-stdin docker.io '${{ secrets.DOCKER_HUB_USERNAME }}'"

      - name: Release Docker Hub image on Dokku
        run: |
          ssh "dokku@${{ secrets.DOKKU_HOST }}" \
            "git:from-image --force '${{ secrets.DOKKU_APP_NAME }}' '${{ needs.build.outputs.image_ref }}' 'GitHub Actions' 'github-actions@users.noreply.github.com'"
